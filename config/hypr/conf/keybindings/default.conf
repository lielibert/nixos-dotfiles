# -----------------------------------------------------
# Key bindings
# name: "Default"
# -----------------------------------------------------

# SUPER KEY
$primaryMod   = SUPER
$secondaryMod = SHIFT
$tertiaryMod  = CTRL

# SCRIPT PATH
$HYPRSCRIPTS = ~/.config/hypr/scripts
$SCRIPTS = ~/.config/hyprswift/scripts

# IMPORTS
# source = ./layouts-keybindings.conf

# GESTURES
gesture = 3, vertical, workspace

# DISABLE HYPRLAND SHORCUTS 
bind = CTRL , Alt_R, submap, passthrough
submap = passthrough
bind = CTRL , Alt_R, submap, reset
submap = reset

# APPLICATIONS
# bind = $primaryMod, RETURN, exec, $SCRIPTS/terminal.sh                 # Open terminal
bind = $primaryMod, RETURN, exec, foot                 # Open terminal
bind = $primaryMod, D, exec, $SCRIPTS/launcher.sh                      # Open app launcher
bind = $primaryMod, B, exec, $SCRIPTS/browser.sh                       # Open browser
bind = $primaryMod, E, exec, $SCRIPTS/filemanager.sh                   # Open filemanager
bind = $primaryMod $secondaryMod, E, exec, $SCRIPTS/emojipicker.sh     # Open the emoji picker
bind = $primaryMod, A, exec, $SCRIPTS/bluetooth-selector.sh            # Open bluetooth-selector
bind = $primaryMod $secondaryMod, A, exec, $SCRIPTS/audio-selector.sh  # Open bluetooth-selector
bind = $primaryMod, N, exec, $SCRIPTS/network-selector.sh              # Open network-selector

# DISPLAY
bind = $primaryMod $secondaryMod, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.2}") # Increase display zoom
bind = $primaryMod $secondaryMod, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.2}") # Decrease display zoom
bind = $primaryMod $secondaryMod, mouse:274, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom
bind = $primaryMod $secondaryMod, EQUAL, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.2}") # Increase display zoom
bind = $primaryMod $secondaryMod, MINUS, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.2}") # Decrease display zoom
bind = $primaryMod $secondaryMod, BACKSPACE, exec, hyprctl keyword cursor:zoom_factor 1 # Reset display zoom

# WALLPAPER & THEME 
bind = $primaryMod, P, exec, $SCRIPTS/wallpaper-selector.sh               # Open wallpaper selector
bind = $primaryMod $secondaryMod, P, exec, $SCRIPTS/wallpaper-switcher.sh # Change wallpaper
bind = $primaryMod, T, exec, $SCRIPTS/theme-switcher.sh                   # Change theme
bind = $primaryMod SHIFT, T, exec, $SCRIPTS/wallpaper-switcher-dir.sh     # Change wallpaper dir

# WINDOWS ACTIONS
bind = $primaryMod, F, fullscreen, 1 # Set active window to fullwidth
bind = $primaryMod $secondaryMod, F, fullscreen, 0 # Set active window to fullscreen
bind = $primaryMod, V, togglefloating     # Toggle active windows into floating mode
bind = $primaryMod $secondaryMod, V, workspaceopt, allfloat # Toggle all windows into floating mode
bindm = $primaryMod, mouse:272, movewindow   # Move window with the mouse
bindm = $primaryMod, mouse:273, resizewindow # Resize window with the mouse
bind = $primaryMod, W, killactive # Kill active window
bind = $primaryMod $secondaryMod, W, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Force kill active window
bind = $primaryMod, R, exec, hyprctl reload # Reload Hyprland configuration
bind = $primaryMod $secondaryMod, R, exec, $HYPRSCRIPTS/loadconfig.sh # Reload hyprland config
bind = $primaryMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh # Take a screenshot
bind = $primaryMod $secondaryMod, S, exec, $HYPRSCRIPTS/screenshot.sh --instant # Take an instant full-screen screenshot
bind = $primaryMod, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area # Take an instant area screenshot
bind = $primaryMod $tertiaryMod, Q, exec, ~/.config/ml4w/scripts/wlogout.sh # Start wlogout
bind = $primaryMod, C, exec, $SCRIPTS/cliphist.sh # Open clipboard manager
bind = $primaryMod, SLASH, exec, $SCRIPTS/config.sh # Open config file editor
bind = $primaryMod, SPACE, exec, $SCRIPTS/scripts.sh # Run bash scripts

# SPECIAL WORKSPACES
bind = $primaryMod, Z, togglespecialworkspace # toggle special workspace
bind = $primaryMod $secondaryMod, Z, movetoworkspace, special # move window to special workspace
# bind = $primaryMod $tertiaryMod, Z, $SCRIPTS/moveTo.sh speical # move all window to speical workspace
bind = $primaryMod, Y, togglespecialworkspace, users # toggle special workspace
bind = $primaryMod $secondaryMod, Y, movetoworkspace, special:users # move window to special workspace
# bind = $primaryMod $tertiaryMod, Y, $SCRIPTS/moveTo.sh speical:users # move all window to speical workspace

# WORKSPACES
bind = $primaryMod, 1, workspace, 1  # Open workspace 1
bind = $primaryMod, 2, workspace, 2  # Open workspace 2
bind = $primaryMod, 3, workspace, 3  # Open workspace 3
bind = $primaryMod, 4, workspace, 4  # Open workspace 4
bind = $primaryMod, 5, workspace, 5  # Open workspace 5
bind = $primaryMod, 6, workspace, 6  # Open workspace 6
bind = $primaryMod, 7, workspace, 7  # Open workspace 7
bind = $primaryMod, 8, workspace, 8  # Open workspace 8
bind = $primaryMod, 9, workspace, 9  # Open workspace 9
bind = $primaryMod, 0, workspace, 10 # Open workspace 10

bind = $primaryMod $secondaryMod, 1, movetoworkspace, 1  # Move active window to workspace 1
bind = $primaryMod $secondaryMod, 2, movetoworkspace, 2  # Move active window to workspace 2
bind = $primaryMod $secondaryMod, 3, movetoworkspace, 3  # Move active window to workspace 3
bind = $primaryMod $secondaryMod, 4, movetoworkspace, 4  # Move active window to workspace 4
bind = $primaryMod $secondaryMod, 5, movetoworkspace, 5  # Move active window to workspace 5
bind = $primaryMod $secondaryMod, 6, movetoworkspace, 6  # Move active window to workspace 6
bind = $primaryMod $secondaryMod, 7, movetoworkspace, 7  # Move active window to workspace 7
bind = $primaryMod $secondaryMod, 8, movetoworkspace, 8  # Move active window to workspace 8
bind = $primaryMod $secondaryMod, 9, movetoworkspace, 9  # Move active window to workspace 9
bind = $primaryMod $secondaryMod, 0, movetoworkspace, 10 # Move active window to workspace 10

bind = $primaryMod $tertiaryMod, 1, exec, $HYPRSCRIPTS/moveTo.sh 1  # Move all windows to workspace 1
bind = $primaryMod $tertiaryMod, 2, exec, $HYPRSCRIPTS/moveTo.sh 2  # Move all windows to workspace 2
bind = $primaryMod $tertiaryMod, 3, exec, $HYPRSCRIPTS/moveTo.sh 3  # Move all windows to workspace 3
bind = $primaryMod $tertiaryMod, 4, exec, $HYPRSCRIPTS/moveTo.sh 4  # Move all windows to workspace 4
bind = $primaryMod $tertiaryMod, 5, exec, $HYPRSCRIPTS/moveTo.sh 5  # Move all windows to workspace 5
bind = $primaryMod $tertiaryMod, 6, exec, $HYPRSCRIPTS/moveTo.sh 6  # Move all windows to workspace 6
bind = $primaryMod $tertiaryMod, 7, exec, $HYPRSCRIPTS/moveTo.sh 7  # Move all windows to workspace 7
bind = $primaryMod $tertiaryMod, 8, exec, $HYPRSCRIPTS/moveTo.sh 8  # Move all windows to workspace 8
bind = $primaryMod $tertiaryMod, 9, exec, $HYPRSCRIPTS/moveTo.sh 9  # Move all windows to workspace 9
bind = $primaryMod $tertiaryMod, 0, exec, $HYPRSCRIPTS/moveTo.sh 10 # Move all windows to workspace 10

# Fn KEYS
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%  # Increase brightness by 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10% # Reduce brightness by 10%
# Increase volume by 5% (max 100% limit also added hold to raise volume)
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# Reduce volume by 5% (min 0% limit also added hold to lower volume)
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle # Toggle mute
bind = , XF86AudioPlay, exec, playerctl play-pause  # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause      # Audio pause
bind = , XF86AudioNext, exec, playerctl next        # Audio next
bind = , XF86AudioPrev, exec, playerctl previous    # Audio previous
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle # Toggle microphone
bind = , XF86Calculator, exec, ~/.config/ml4w/settings/calculator.sh # Open calculator
bind = , XF86Lock, exec, hyprlock # Open screenlock

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-
